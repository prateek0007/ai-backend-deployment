services:

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    logging:
        driver: "json-file"
        options:
            max-size: "10m"
            max-file: "3"
      

    expose:
      - "8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - backend

  postgres:
    image: postgres:16

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
         max-size: "10m"
         max-file: "3"
    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7

    restart: unless-stopped

    ports:
      - "6379:6379"
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  nginx:
    image: nginx:latest

    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      app:
        condition: service_healthy

    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
