services:

  app:
    build:
      context: ./app
      dockerfile: Dockerfile

    expose:
      - "8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    restart: always

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    networks:
      - backend

  postgres:
    image: postgres:16

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7

    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  nginx:
    image: nginx:latest

    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
